<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quesitos Autistas - Leaderboard 2026</title>
    <link rel="icon" type="image/png" href="https://imgur.com/eTV6BxG">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="overlay-mantenimiento">
        <div class="cartel-mantenimiento">
            <div class="barra-peligro barra-izq"></div>
            <div class="barra-peligro barra-der"></div>
            <h2 style="color: var(--amarillo-brillante); font-size: 2rem; margin-bottom: 10px;">PÁGINA EN CONSTRUCCIÓN</h2>
            <p style="color: var(--color-subtexto); font-size: 1.1rem; margin-bottom: 30px;">
                Estamos trabajando en los detalles visuales y el sistema de PL.<br>
                <b>Por favor, ser paciente.</b>
            </p>
            <button class="tab-btn active" style="padding: 15px 40px; font-size: 1rem;" onclick="cerrarAviso()">ENTRAR DE TODAS FORMAS</button>
        </div>
    </div>

    <div class="super-contenedor">
        <div class="cabecera">
            <h1>QUESITOS AUTISTAS</h1>
            <div class="ultima-actualizacion" id="update-time">ACTUALIZANDO...</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="btn-soloq" onclick="cambiarModo('soloq')">SOLO / DUO</button>
            <button class="tab-btn" id="btn-flex" onclick="cambiarModo('flex')">FLEX</button>
            <button class="tab-btn" id="btn-aram" onclick="cambiarModo('aram')">ARAM</button>
        </div>

        <div id="aram-aviso" style="display: none; background: rgba(242, 87, 87, 0.15); border-left: 5px solid #f25757; padding: 15px; border-radius: 8px; margin-bottom: 5px; text-align: center; color: white;">
            ⚠️ <b>¡ATENCIÓN!</b> Los datos y clasificaciones de ARAM son temporales/ficticios y el sistema sigue en construcción.
        </div>

        <div class="seccion-principal">
            <div class="contenedor-tabla">
                <table class="tabla-leaderboard">
                    <thead>
                        <tr>
                            <th style="width:30px">#</th>
                            <th>JUGADOR</th>
                            <th>PJs</th>
                            <th style="text-align:center">RANKING</th>
                            <th style="text-align:right">W/L</th>
                        </tr>
                    </thead>
                    <tbody id="lista-jugadores-body"></tbody>
                </table>
            </div>
            <div class="contenedor-grafico" style="position: relative;">
                <button onclick="resetearZoom()" class="btn-reset-zoom">Reset Zoom</button>
                <canvas id="graficoElo"></canvas>
            </div>
        </div>

        <div id="seccion-scouter" class="seccion-scouter">
            <h2 id="scouter-nombre" style="margin-top:0; color: var(--amarillo-pro)"></h2>
            <div id="lista-partidas"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
