<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quesitos Autistas - Leaderboard 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-principal: #0e1015;
            --bg-tarjeta: #161921;
            --color-texto: #ffffff;
            --color-subtexto: #9ca3af;
            --amarillo-pro: #d4b55c;
            --amarillo-brillante: #fffae6;
            --color-emerald: #2add9c;
            --color-diamond: #5765f2;
            --color-platinum: #4bcaeb;
            --color-gold: #f2af42;
            --color-silver: #a0a0a0;
            --color-bronze: #cd7f32;
            --color-iron: #51483c;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--color-texto);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* --- ESTILOS DEL AVISO DE CONSTRUCCIÓN --- */
        #overlay-mantenimiento {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .cartel-mantenimiento {
            background: var(--bg-tarjeta);
            border: 1px solid #2d3748;
            padding: 50px;
            border-radius: 15px;
            text-align: center;
            position: relative;
            overflow: hidden;
            max-width: 600px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .barra-peligro {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 25px;
            background: repeating-linear-gradient(45deg, #d4b55c, #d4b55c 10px, #000 10px, #000 20px);
        }

        .barra-izq {
            left: 0;
        }

        .barra-der {
            right: 0;
        }
        /* ---------------------------------------- */

        .super-contenedor {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .cabecera {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d3748;
            padding-bottom: 15px;
        }

        h1 {
            margin: 0;
            color: var(--amarillo-brillante);
            font-weight: 800;
        }

        .ultima-actualizacion {
            background-color: #1a202c;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--color-subtexto);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 5px;
        }

        .tab-btn {
            background: #1a202c;
            border: 1px solid #2d3748;
            color: white;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

            .tab-btn:hover {
                background: #2d3748;
            }

            .tab-btn.active {
                border-color: var(--amarillo-pro);
                color: var(--amarillo-pro);
                background: #1e2328;
            }

        .seccion-principal {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .contenedor-tabla {
            flex: 2;
            min-width: 600px;
            background-color: var(--bg-tarjeta);
            border-radius: 12px;
            padding: 10px;
            border: 1px solid #2d3748;
        }

        .contenedor-grafico {
            flex: 1;
            min-width: 400px;
            background-color: var(--bg-tarjeta);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2d3748;
            height: 600px;
        }

        .tabla-leaderboard {
            width: 100%;
            border-collapse: collapse;
        }

            .tabla-leaderboard th {
                text-align: left;
                color: var(--color-subtexto);
                font-size: 0.75rem;
                padding: 10px;
                border-bottom: 1px solid #2d3748;
            }

        .fila-jugador {
            border-bottom: 1px solid #1a202c;
            cursor: pointer;
        }

            .fila-jugador:hover {
                background-color: #1f2937;
            }

        .tabla-leaderboard td {
            padding: 8px 10px;
        }

        .col-rank {
            color: var(--amarillo-pro);
            font-weight: 800;
            text-align: center;
        }

        .col-nombre {
            font-weight: 700;
            color: var(--amarillo-brillante);
            font-size: 1.1rem;
        }

        .tag {
            color: var(--color-subtexto);
            font-size: 0.8em;
        }

        .col-rango-completo {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 85px;
            overflow: hidden;
        }

        .contenedor-icono-fijo {
            width: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .rank-icon {
            width: 110px;
            height: 110px;
            object-fit: contain;
            transform: scale(2.5);
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        .rank-info-texto {
            width: 160px;
            text-align: left;
            padding-left: 10px;
            z-index: 10;
        }

        .lp-progress-container {
            width: 100%;
            height: 18px;
            background-color: #2d3748;
            border-radius: 10px;
            margin-top: 5px;
            overflow: hidden;
            position: relative;
        }

        .lp-progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .lp-text-centered {
            position: absolute;
            width: 100%;
            top: 0;
            left: 0;
            text-align: center;
            font-size: 0.75rem;
            line-height: 18px;
            font-weight: 800;
            color: white;
            text-shadow: 1px 1px 2px black;
        }

        .seccion-scouter {
            margin-top: 20px;
            background: var(--bg-tarjeta);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #2d3748;
            display: none;
        }

        .match-card {
            display: grid;
            grid-template-columns: 130px 180px 150px 240px 1fr;
            align-items: center;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            background: #1c1f26;
            border-left: 6px solid #555;
        }

            .match-card.win {
                border-left-color: var(--color-emerald);
                background: rgba(42, 221, 156, 0.05);
            }

            .match-card.loss {
                border-left-color: #f25757;
                background: rgba(242, 87, 87, 0.05);
            }

        .m-info {
            font-size: 0.8rem;
            color: var(--color-subtexto);
            line-height: 1.4;
        }

            .m-info b {
                display: block;
                font-size: 0.95rem;
                color: white;
            }

        .lp-gain {
            color: #2add9c;
            font-weight: 800;
            margin-top: 5px;
            display: block;
        }

        .lp-loss {
            color: #f25757;
            font-weight: 800;
            margin-top: 5px;
            display: block;
        }

        .m-champ-block {
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }

        .m-champ-img-container {
            position: relative;
            width: 64px;
            height: 64px;
        }

            .m-champ-img-container img.main-champ {
                width: 64px;
                height: 64px;
                border-radius: 50%;
                border: 2px solid #2d3748;
            }

        .m-lvl {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #000;
            font-size: 0.65rem;
            padding: 1px 4px;
            border-radius: 4px;
            border: 1px solid #333;
            color: white;
        }

        .role-icon {
            position: absolute;
            top: -5px;
            left: -5px;
            width: 22px;
            height: 22px;
            background: #1c1f26;
            border-radius: 50%;
            padding: 2px;
        }

        .m-spells-runes {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .m-spell, .m-rune {
            width: 22px;
            height: 22px;
            border-radius: 4px;
            background: #000;
        }

        .m-rune {
            border-radius: 50%;
        }

        .m-stats {
            text-align: center;
        }

        .m-kda {
            font-size: 1.15rem;
            font-weight: 800;
        }

        .m-cs {
            font-size: 0.75rem;
            color: var(--color-subtexto);
            margin-top: 2px;
        }

        .m-items {
            display: grid;
            grid-template-columns: repeat(4, 32px);
            gap: 4px;
        }

        .m-item-box {
            width: 32px;
            height: 32px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            overflow: hidden;
        }

            .m-item-box img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

        .m-teams {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            font-size: 0.72rem;
        }

        .player-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 3px;
            font-family: 'Inter', sans-serif;
        }

            .player-row img {
                width: 18px;
                height: 18px;
                border-radius: 3px;
            }

            .player-row b {
                color: #aaa;
                font-weight: 500;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 85px;
            }

            .player-row.me b {
                color: var(--color-gold);
                font-weight: 800;
            }

        .col-wr {
            text-align: right;
            font-size: 1.1rem;
        }

        .rank-EMERALD {
            color: var(--color-emerald);
        }

        .rank-DIAMOND {
            color: var(--color-diamond);
        }

        .rank-PLATINUM {
            color: var(--color-platinum);
        }

        .rank-GOLD {
            color: var(--color-gold);
        }

        .rank-SILVER {
            color: var(--color-silver);
        }

        .rank-BRONZE {
            color: var(--color-bronze);
        }

        .rank-IRON {
            color: var(--color-iron);
        }

        .rank-UNRANKED {
            color: var(--color-subtexto);
        }
    </style>
</head>
<body>

    <div id="overlay-mantenimiento">
        <div class="cartel-mantenimiento">
            <div class="barra-peligro barra-izq"></div>
            <div class="barra-peligro barra-der"></div>
            <h2 style="color: var(--amarillo-brillante); font-size: 2rem; margin-bottom: 10px;">PÁGINA EN CONSTRUCCIÓN</h2>
            <p style="color: var(--color-subtexto); font-size: 1.1rem; margin-bottom: 30px;">
                Estamos trabajando en los detalles visuales y el sistema de PL.<br>
                <b>Por favor, ser paciente.</b>
            </p>
            <button class="tab-btn active" style="padding: 15px 40px; font-size: 1rem;" onclick="cerrarAviso()">ENTRAR DE TODAS FORMAS</button>
        </div>
    </div>

    <div class="super-contenedor">
        <div class="cabecera">
            <h1>QUESITOS AUTISTAS</h1>
            <div class="ultima-actualizacion" id="update-time">ACTUALIZANDO...</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="btn-soloq" onclick="cambiarModo('soloq')">SOLO / DUO</button>
            <button class="tab-btn" id="btn-flex" onclick="cambiarModo('flex')">FLEX</button>
            <button class="tab-btn" id="btn-aram" onclick="cambiarModo('aram')">ARAM</button>
        </div>

        <div class="seccion-principal">
            <div class="contenedor-tabla">
                <table class="tabla-leaderboard">
                    <thead>
                        <tr><th class="col-rank">#</th><th>JUGADOR</th><th>PARTIDAS</th><th style="text-align: center;">RANKING</th><th style="text-align: right;">W/L</th></tr>
                    </thead>
                    <tbody id="lista-jugadores-body"></tbody>
                </table>
            </div>
            <div class="contenedor-grafico"><canvas id="graficoElo"></canvas></div>
        </div>

        <div id="seccion-scouter" class="seccion-scouter">
            <h2 id="scouter-nombre" style="margin-top:0; color: var(--amarillo-pro)"></h2>
            <div id="lista-partidas"></div>
        </div>
    </div>

    <script>
        let datosGlobales = [];
        let modoActual = 'soloq';
        let miGrafica = null;
        const LOL_VER = "14.8.1";

        function cerrarAviso() {
        document.getElementById('overlay-mantenimiento').style.display = 'none';
        }

        function cambiarModo(modo) {
        modoActual = modo;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${modo}`).classList.add('active');
        renderizarTabla();
        actualizarGrafica();
        }

        function renderizarTabla() {
        const tbody = document.getElementById('lista-jugadores-body');
        tbody.innerHTML = '';
        datosGlobales.sort((a, b) => b[modoActual].puntos_grafica - a[modoActual].puntos_grafica);

        datosGlobales.forEach((j, i) => {
        const stats = j[modoActual];
        const tier = stats.tier.toLowerCase();
        const icon = `https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/ranked-emblem/emblem-${tier}.png`;
        const color = getComputedStyle(document.documentElement).getPropertyValue(`--color-${tier}`).trim() || '#8c52ff';

        const tr = document.createElement('tr');
        tr.className = 'fila-jugador';
        tr.onclick = () => mostrarScouter(j);
        tr.innerHTML = `
        <td class="col-rank">${i + 1}</td>
        <td class="col-nombre">${j.nombre} <span class="tag">#${j.tag}</span></td>
        <td><b>${stats.wins + stats.losses}</b> PJs</td>
        <td class="col-elo">
        <div class="col-rango-completo">
        <div class="contenedor-icono-fijo">${stats.tier !== "UNRANKED" ? `<img src="${icon}" class="rank-icon">` : ''}</div>
        <div class="rank-info-texto rank-${stats.tier}">
        <div class="lp-progress-container">
        <div class="lp-progress-fill" style="width: ${Math.min(stats.lp, 100)}%; background-color: ${color}"></div>
        <div class="lp-text-centered">${modoActual === 'aram' ? 'ARAM KING' : stats.tier + ' ' + stats.rank} - ${stats.lp} LP</div>
        </div>
        </div>
        </div>
        </td>
        <td style="text-align:right"><b>${stats.wr}%</b></td>
        `;
        tbody.appendChild(tr);
        });
        }

        function actualizarGrafica() {
        const ctx = document.getElementById('graficoElo').getContext('2d');
        if (miGrafica) miGrafica.destroy();

        const labels = datosGlobales[0].historiales[modoActual].map(h => h.fecha);
        const datasets = datosGlobales.slice(0, 5).map(j => ({
        label: j.nombre,
        data: j.historiales[modoActual].map(h => h.puntos),
        borderColor: getComputedStyle(document.documentElement).getPropertyValue(`--color-${j[modoActual].tier.toLowerCase()}`).trim() || '#d4b55c',
        backgroundColor: 'transparent',
        borderWidth: 3,
        tension: 0.3,
        pointRadius: 4
        }));

        miGrafica = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { labels: { color: '#9ca3af', font: { size: 11 } } } },
        scales: {
        y: { grid: { color: '#2d3748' }, ticks: { color: '#9ca3af' } },
        x: { grid: { color: '#2d3748' }, ticks: { color: '#9ca3af' } }
        }
        }
        });
        }

        function mostrarScouter(j) {
        document.getElementById('seccion-scouter').style.display = 'block';
        document.getElementById('scouter-nombre').textContent = `SCOUTER: ${j.nombre}`;
        const lista = document.getElementById('lista-partidas');
        lista.innerHTML = '';

        j.partidas[modoActual].forEach(p => {
        const card = document.createElement('div');
        card.className = `match-card ${p.win ? 'win' : 'loss'}`;

        const renderTeam = (team) => team.map(pl => `
        <div class="player-row ${pl.name === j.nombre ? 'me' : ''}">
        <img src="https://ddragon.leagueoflegends.com/cdn/${LOL_VER}/img/champion/${pl.champ}.png">
        <b>${pl.name}</b>
        </div>`).join('');

        const renderItems = p.items.map(id => {
        const url = id > 0 ? `https://ddragon.leagueoflegends.com/cdn/${LOL_VER}/img/item/${id}.png` : '';
        return `<div class="m-item-box">${url ? `<img src="${url}">` : ''}</div>`;
        }).join('');

        const roleMapping = { 'middle': 'mid', 'jungle': 'jung', 'bottom': 'bot', 'utility': 'support', 'top': 'top' };
        const pos = p.role ? roleMapping[p.role.toLowerCase()] || 'none' : 'none';
        const posIcon = pos !== 'none' ? `https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/ranked-positions/position-icon-${pos}.png` : '';

        const fixSum = (s) => s.replace('Ignite', 'Dot');

        card.innerHTML = `
        <div class="m-info">
        <b style="color:${p.win ? '#2add9c' : '#f25757'}">${p.win ? 'Victoria' : 'Derrota'}</b>
        ${p.fecha} • ${p.duracion}
        <span class="${p.win ? 'lp-gain' : 'lp-loss'}">${p.win ? '+' : '-'}${p.lp_change || 20} LP</span>
        </div>
        <div class="m-champ-block">
        <div class="m-champ-img-container">
        <img class="main-champ" src="https://ddragon.leagueoflegends.com/cdn/${LOL_VER}/img/champion/${p.champ}.png">
        <span class="m-lvl">${p.lvl}</span>
        ${posIcon ? `<img src="${posIcon}" class="role-icon">` : ''}
        </div>
        <div class="m-spells-runes">
        <img class="m-spell" src="https://ddragon.leagueoflegends.com/cdn/${LOL_VER}/img/spell/${p.summoners ? fixSum(p.summoners[0]) : 'SummonerFlash'}.png">
        <img class="m-spell" src="https://ddragon.leagueoflegends.com/cdn/${LOL_VER}/img/spell/${p.summoners ? fixSum(p.summoners[1]) : 'SummonerDot'}.png">
        </div>
        <div class="m-spells-runes">
        <img class="m-rune" src="https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/perk-images/styles/7200_domination.png">
        <img class="m-rune" src="https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/perk-images/styles/7203_whimsy.png" style="width:16px; height:16px">
        </div>
        </div>
        <div class="m-stats">
        <div class="m-kda">${p.k} / <span style="color:#f25757">${p.d}</span> / ${p.a}</div>
        <div class="m-cs">${p.cs} CS (${(p.cs/25).toFixed(1)})</div>
        </div>
        <div class="m-items">${renderItems}</div>
        <div class="m-teams">
        <div class="team-col">${renderTeam(p.team1)}</div>
        <div class="team-col">${renderTeam(p.team2)}</div>
        </div>
        `;
        lista.appendChild(card);
        });
        document.getElementById('seccion-scouter').scrollIntoView({ behavior: 'smooth' });
        }

        fetch('datos.json').then(res => res.json()).then(d => {
        datosGlobales = d;
        document.getElementById('update-time').textContent = "LEADERBOARD ACTIVA";
        cambiarModo('soloq');
        });
    </script>
</body>
</html>
